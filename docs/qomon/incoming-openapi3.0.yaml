components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  examples:
    minimalSearch:
      value:
        data:
          advanced_search:
            per_page: 1000
            query:
              $all: []
    advancedSearchSimple:
      value:
        data:
          advanced_search:
            page: 0
            per_page: 50
            sort_asc: true
            sort_attr: surname
            query:
              "$all":
                - "$at_least_one":
                    - "$condition":
                        attr: address.city
                        ope: eql
                        value: Bordeaux
                    - "$condition":
                        attr: address.city
                        ope: eql
                        value: Talence
                    - "$condition":
                        attr: address.city
                        ope: eql
                        value: Mérignac
      description: |-
        <b>Search contacts with:</b>
        <br>(address.city is equal to Bordeaux
        <br>OR address.city is equal to Talence
        <br>OR address.city is equal to Mérignac)
    advancedSearchFull:
      value:
        data:
          advanced_search:
            page: 0
            per_page: 50
            sort_asc: true
            sort_attr: surname
            include_interactions: true
            query:
              "$all":
                - "$at_least_one":
                    - "$condition":
                        attr: mobile
                        ope: ext
                    - "$condition":
                        attr: phone
                        ope: ext
                - "$all":
                    - "$condition":
                        attr: form
                        form_id: 4530
                        form_ref_ids:
                          - 7486
                        ope: eql
                        value:
                - "$all":
                    - "$condition":
                        attr: form
                        form_id: 544
                        form_ref_ids:
                          - 6420
                        ope: eql
                        value:
      description: |-
        <b>Search contacts with:</b>
        <br>(mobile exist OR phone exist)
        <br>AND (ref value of form 4530 is equal to 7486)
        <i>-> (ex: form 4530 is "Consentement RGPD" and ref value 7486 is "OK for call and SMS")</i>
        <br>AND (ref value of form 544 is equal to 6420)
        <i>-> (ex: form 544 is "Level of support" and ref value 6420 is "indecisive")</i>

  schemas:
    Contact:
      type: object
      properties:
        firstname:
          type: string
          description: <br><i>this field is the firstname of the contact</i>
          example: Jeanne
        surname:
          type: string
          example: Dupont
          description: <br><i>this field is the lastname/surname of the contact</i>
        married_name:
          type: string
          example: Dupont
          description: <br><i>this field is the married name of the contact</i>
        gender:
          type: string
          example: F
          description: <br><i>this field is the gender of the contact (possible values =>
            F,M and O)</i>
        birthdate:
          type: string
          format: date-time
          example: "1955-07-06T00:00:00Z"
          description: <br><i>this field is the birthdate of the contact</i>
        age_category:
          type: integer
          description: <br><i>this field is the age category of the contact.<br>It's a
            range from 0 to 6 by default (it can be customize).<br>0 is for
            example people that are 18 years old or lower.1 is from 18 to 25
            years old, etc.</i>
        birthdept:
          type: string
          description: <br><i>this field is the birth county of the contact</i>
        birthcity:
          type: string
          description: <br><i>this field is the birth city of the contact</i>
        birthcountry:
          type: string
          description: <br><i>this field is the birth country of the contact</i>
        nationality:
          type: string
          description: <br><i>this field is the nationality of the contact</i>
        mail:
          type: string
          format: email
          description: <br><i>this field is the email of the contact</i>
        phone:
          type: string
          description: <br><i>this field is the land phone number of the contact</i>
        mobile:
          type: string
          description: <br><i>this field is the mobile phone number of the contact</i>
        address:
          $ref: "#/components/schemas/Address"
        tags:
          type: array
          items:
            type: object
            required: [name]
            properties:
              name:
                type: string
        actions_ids:
          type: array
          items:
            type: integer
          description: <br><i>this array give you the acion id where this contact is
            linked to</i>
        user_id:
          type: integer
          description: <br><i>This field provides the user ID of the last user who updated
            the contact.</i>
        user_contact_id:
          type: integer
          description: <br><i>this field give you the id of the user linked with this
            contact</i>
        formdatas:
          type: array
          items:
            $ref: "#/components/schemas/FormData"
          description: <br><i>this array is where are stored the survey/level of
            support/presence status/consent informations for the contact</i>
        customfields:
          type: array
          items:
            $ref: "#/components/schemas/FormData"
          description: <br><i>this array is where are stored the custom fields
            informations for the contact</i>
        black_list:
          type: boolean
          description: Prevent any communication with this contact.
          example: true
        notes:
          type: array
          items:
            type: object
            required:
              - content
            properties:
              id:
                type: integer
              content:
                type: string
              pinned:
                type: boolean

