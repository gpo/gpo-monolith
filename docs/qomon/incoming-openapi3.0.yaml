openapi: 3.0.0
info:
  version: "1.1.0"
  title: Qomon Public API Documentation

servers:
  - url: https://incoming.qomon.app

security:
  - bearerAuth: []

tags:
  - name: Contacts
    description: Create, Read, Update, Delete Qomon's contacts.
  - name: Forms
    description: Retrieve forms by their ID or list them based on their type.

paths:
  /contacts/upsert:
    post:
      tags:
        - Contacts
      summary: Upsert a contact asynchronously. (Strongly recommended)
      description: |-
        Upsert a contact asynchronously in the Qomon database.

        ## Contact Matching Logic
        When upserting, the system tries to find an existing contact to update using the following strategy (in order). If no match is found, a new contact is created.

        1. Match by ID
          - If an `id` is provided and matches an existing contact, that contact will be updated (can be a contact ID or nationbuilder ID).

        2. Match by email + name
          - If no ID is provided (or it didn't match), the system searches for contacts with the same `mail`.
          - Among the results, if `firstname` is provided, it must also match. If `surname` is provided, it must also match. (An empty value for `firstname` or `surname` means the field will not be used for matching.)
          - If a match is found, that contact is updated.

        3. Match by surname + firstname + birthdate + address
          - If no match was found by email, and a `surname` is provided, the system searches for contacts with the same `surname`.
          - Among the results, `firstname` must match.
          - If both the incoming and the existing contact have a `birthdate`, they must match exactly.
          - If both contacts have an `address`, the `city` or `postalcode` must match. If no birthdate comparison was made, the `street` must also match.
          - If all the above conditions are met, that contact is updated.

        4. No match found
          - If none of the above strategies found a match, a new contact is created.

        ⚠️ If the `id` or `label` of an advanced field, or the `value` (for non-free-text fields), does not exist, the contact will not be updated or created. *Errors will not be logged.*

        💡 For consents, level_of_support, custom_fields, survey, tasks:
          - See details in above description.
          - Found `id`, `label`, `value` in `GET /forms/{type}` endpoint.  

      operationId: upsertContact
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [kind, data]
              additionalProperties: false
              properties:
                kind:
                  type: string
                  enum: [contact]
                data:
                  $ref: "#/components/schemas/ContactUpsert"
            examples:
              Basic fields:
                value:
                  kind: contact
                  data:
                    firstname: John
                    surname: Doe
                    gender: M
                    mail: john.doe@example.com
                    married_name: Doe
                    birthdate: "1999-12-31T23:00:00.000Z"
                    birthcity: Paris
                    birthcountry: France
                    nationality: Francais
                    mobile: "0123456789"
                    phone: "0123456789"
                    address:
                      building: A
                      floor: "2"
                      door: "3"
                      housenumber: "123"
                      street: Rue de la paix
                      addition: Résidence de la paix
                      postalcode: "75001"
                      city: Paris
                      country: France
                    tags:
                      - name: tag1
                      - name: tag2
              Advanced fields (survey, custom fields, consent):
                value:
                  kind: contact
                  data:
                    firstname: John
                    surname: Doe
                    gender: M
                    mail: john.doe@example.com
                    married_name: Doe
                    birthdate: "1999-12-31T23:00:00.000Z"
                    birthcity: Paris
                    birthcountry: France
                    mobile: "0123456789"
                    phone: "0123456789"
                    address:
                      building: A
                      floor: "2"
                      door: "3"
                      housenumber: "123"
                      street: Rue de la paix
                      addition: Résidence de la paix
                      postalcode: "75001"
                      city: Paris
                      country: France
                    tags:
                      - name: tag1
                      - name: tag2
                    custom_fields:
                      - label: Job
                        value: Architect
                      - label: Favorites food
                        value: hamburger
                      - label: Favorites food
                        value: pizza
                    status:
                      - label: Level of support
                        value: to_be_convinced
                    consents:
                      - label: The contact authorises me to collect and use the collected data for my
                        value: yes
                    forms:
                      - label: What do you see as the city's strengths?
                        value: Roads
                    actions:
                      - label: Next step
                        value: recevoir_nos_informations
              Basic fields with email consent:
                value:
                  kind: contact
                  data:
                    firstname: John
                    surname: Doe
                    gender: M
                    mail: john.doe@example.com
                    married_name: Doe
                    birthdate: "1999-12-31T23:00:00.000Z"
                    birthcity: Paris
                    birthcountry: France
                    mobile: "0123456789"
                    phone: "0123456789"
                    address:
                      building: A
                      floor: "2"
                      door: "3"
                      housenumber: "123"
                      street: Rue de la paix
                      addition: Résidence de la paix
                      postalcode: "75001"
                      city: Paris
                      country: France
                    consents:
                      value: "consent_email"
      responses:
        202:
          description: Accepted
        400:
          description: Invalid input
        500:
          description: Internal server error
  /contacts/{contactId}:
    get:
      tags:
        - Contacts
      summary: Find a contact by ID.
      description: |-
        Returns a single contact.

        Use this endpoint to get a contact by its ID.

        In the response advanced fields except custom fields are formatted as `formdatas` structure with `form_id` and `form_ref_id`.
          - `form_id`: the ID of the advanced field
          - `form_ref_id`: the ID of the value of the advanced field

          ```json
          "formdatas": [
            {
              "form_id": 47566,
              "form_ref_id": 15648,
              "data": "consent_email"
            }
          ]
          ```

      operationId: getContactPerId
      parameters:
        - name: contactId
          in: path
          description: ID of contact to return
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      contact:
                        $ref: "#/components/schemas/ContactResponse"
        default:
          description: Unsuccessful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail
    delete:
      tags:
        - Contacts
      summary: Delete a contact by ID synchronously.
      operationId: deleteContactPerId
      parameters:
        - name: contactId
          in: path
          description: ID of contact to delete
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Successful operation
    patch:
      tags:
        - Contacts
      summary: Fully update (REPLACE) an existing contact by id synchronously.
      description: |-
        Update entirely an existing contact by id synchronously in the Qomon database (behaves like PUT).
        Fully replace an existing contact in the Qomon database.

        ⚠️ Important:
        - This endpoint uses the PATCH verb but behaves like a PUT (full replacement).
        - Any fields that are NOT included in the payload will be cleared/removed.
        - Always send the full contact object if you don't want to lose existing data.

        To synchronize and mass update your contacts with Qomon database, use the UPSERT route instead.

        To specify the advanced fields (survey, consents, etc), you need to use the `formdatas` structure with `form_id` and `form_ref_id`.
        - `form_id`: the ID of the advanced field
        - `form_ref_id`: the ID of the value of the advanced field
        - `data`: free text if the field ("forms") type is Text, Integer, or Date (format : YYYY-MM-DD'T'HH:mm:ss.SSS'Z'); otherwise, use the value of the refvalue
        - `date`: the date of the formdata entry

        ```json
        "formdatas": [
          {
            "form_id": 47566,
            "form_ref_id": 15648,
            "data": "consent_email"
          }
        ]
        ```
        To specify the custom fields, you need to use the `custom_fields` structure with `form_id` and `form_ref_id`.
        - `form_id`: the ID of the custom field
        - `form_ref_id`: the ID of the value of the custom field
        - `data`: free text if the field ("forms") type is Text, Integer, or Date (format : YYYY-MM-DD'T'HH:mm:ss.SSS'Z'); otherwise, use the value of the refvalue
        - `date`: the date of the custom_field entry 

        ```json
        "custom_fields": [
          {
            "form_id": 879854,
            "form_ref_id": 98741,
            "data": "hamburger",
            "date": "2024-07-17T11:34:42.195Z"
          }
        ]
        ```
        NB :
          - Each patch will generate new ids for formdatas and custom_fields. (due to the full replace behavior : soft delete + recreate)
          - If you don't send the exhaustive list of formdatas or custom_fields, the missing ones will be deleted (soft).
          - For Text, Integer and Date Fields, If you add a formdata or custom_field, it will be added to the existing ones.
          - For Radio (single select), If you add a formdata or custom_field, it will replace the existing ones.
          - For Checkbox (multi-select) fields, any new value will be added to the existing ones.
          - If you change a formdata or custom_field with, it will update it. (the id is not required here because of the full-replace behavior).
      operationId: updateContactPerId
      parameters:
        - name: contactId
          in: path
          description: ID of contact to update
          required: true
          schema:
            type: integer
      requestBody:
        description: The new values of the contact
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    contact:
                      $ref: "#/components/schemas/Contact"
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      contact:
                        $ref: "#/components/schemas/ContactResponse"
        default:
          description: Unsuccessful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail

  /contacts:
    post:
      tags:
        - Contacts
      summary: Create a contact synchronously.
      description: |-
        Create a contact synchronously in the Qomon database.

        To synchronize and mass update your contacts with Qomon database, use the UPSERT route instead.

        To specify the advanced (custom fields, survey, etc) fields, you need to use the `formdatas` structure with `form_id` and `form_ref_id`.
        - `form_id`: the ID of the advanced field
        - `form_ref_id`: the ID of the value of the advanced field

        ```json
        "formdatas": [
          {
            "form_id": 47566,
            "form_ref_id": 15648,
            "data": "consent_email"
          }
        ]
        ```

      operationId: createContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  required: [contact]
                  properties:
                    contact:
                      $ref: "#/components/schemas/Contact"
            examples:
              Basic:
                value:
                  data:
                    contact:
                      firstname: John
                      surname: Doe
                      birthdate: "1999-12-31T23:00:00.000Z"
                      mail: john.doe@example.com
                      mobile: "0123456789"
                      address:
                        building: A
                        floor: "2"
                        door: "3"
                        housenumber: "123"
                        street: Rue de la paix
                        addition: Résidence de la paix
                        postalcode: "75001"
                        city: Paris
                        country: France
              Basic with formdatas:
                value:
                  data:
                    contact:
                      gender: M
                      firstname: John
                      surname: Doe
                      married_name: Doe
                      birthdate: "1999-12-31T23:00:00.000Z"
                      birthcity: Paris
                      birthcountry: France
                      nationality: Francais
                      mail: john.doe@example.com
                      mobile: "0123456789"
                      phone: "0123456789"
                      address:
                        building: A
                        floor: "2"
                        door: "3"
                        housenumber: "123"
                        street: Rue de la paix
                        addition: Résidence de la paix
                        postalcode: "75001"
                        city: Paris
                        country: France
                      tags:
                        - name: tag1
                        - name: tag2
                      formdatas:
                        - form_id: 47566
                          form_ref_id: 15648
                          data: consent_email
                        - form_id: 879856
                          form_ref_id: 98746
                          data: "Yes"
                      custom_fields:
                        - form_id: 879854
                          form_ref_id: 98741
                          data: hamburger
                      black_list: false
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                required: [status, data]
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    required: [contact]
                    properties:
                      contact:
                        required: [id]
                        $ref: "#/components/schemas/ContactResponse"
        default:
          description: Unsuccessful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: fail

  /search:
    post:
      tags:
        - Contacts
      summary: Search for contacts
      description: |
        Search for contacts given a query.  
        The query is a **2-level condition tree** that allows you to build complex filters using logical operators.

        ## Query Structure

        The query uses a nested structure with two levels:

        - **Level 1 (Root):** Contains a logical operator (`$all` or `$at_least_one`) with an array of level 2 elements.
        - **Level 2:** Contains either another logical operator (for nested logic) or conditions (`$condition`).

        **Logic operators available:**

        | Operator | Description | Behavior |
        |----------|-------------|----------|
        | `$all` | AND operator | All conditions in the array must match |
        | `$at_least_one` | OR operator | At least one condition in the array must match |


        **Conditions** are defined by the key `$condition` in the array. The value is an object with the following properties:
        - `attr`: the attribute to search *(required)*
        - `ope`: the operator to use *(required)*
        - `value`: the value to search
        - `from`: the start date for a range operator
        - `to`: the end date for a range operator


        **Example: Simple query (city equals Paris)**
        ```json
        {
          "data": {
            "advanced_search": {
              "per_page": 100,
              "query": {
                "$all": [
                  "$all": [
                    {
                      "$condition": {
                        "attr": "address.city",
                        "ope": "eql",
                        "value": "New York"
                      }
                    }
                  ]
                ]
              }
            }
          }
        }
        ```

        **Example: Complex query with AND + OR logic**

        Find contacts where: `(city is Paris OR city is Lyon) AND (mobile exists)`
        ```json
        {
          "data": {
            "advanced_search": {
              "per_page": 100,
              "query": {
                "$all": [
                  {
                    "$at_least_one": [
                      { "$condition": { "attr": "address.city", "ope": "eql", "value": "New York" } },
                      { "$condition": { "attr": "address.city", "ope": "eql", "value": "Paris" } }
                    ]
                  },
                  {
                    "$condition": { "attr": "mobile", "ope": "ext" }
                  }
                ]
              }
            }
          }
        }
        ```

        ---

        ## Available Operators (`ope`)

        | Operator | Description |
        |----------|-------------|
        | `eql` | Equals |
        | `not_eql` | Not equals |
        | `eql:strictdata` | Equals (strict data) |
        | `not_eql:strictdata` | Not equals (strict data) |
        | `contains` | Contains |
        | `not_contains` | Does not contain |
        | `start_with` | Starts with |
        | `not_start_with` | Does not start with |
        | `any_of` | Any of (at least one matches) |
        | `none_of` | None of |
        | `all_of` | All of |
        | `ext` | Exists / Reported |
        | `not_ext` | Does not exist / Not reported |
        | `range` | Range (use with `from` and `to`) |
        | `lte` | Less than or equal to |
        | `gte` | Greater than or equal to |
        | `period` | Period |
        | `today` | Today |


        ## Available Attributes (`attr`)


        These are some attributes you can use in your conditions to search for contacts:

        | Attribute | Supported Operators |
        |-----------|---------------------|
        | `firstname` | `eql`, `not_eql`, `ext`, `not_ext`, `start_with`, `not_start_with` |
        | `surname` | `eql`, `not_eql`, `ext`, `not_ext`, `start_with`, `not_start_with` |
        | `married_name` | `eql`, `not_eql`, `ext`, `not_ext`, `start_with`, `not_start_with` |
        | `gender` | `eql`, `not_eql`, `ext`, `not_ext` |
        | `age_cat` | `eql`, `not_eql`, `ext`, `not_ext` |
        | `birthdate` | `eql`, `ext`, `not_ext`, `range`, `lte`, `gte`, `period` |
        | `birthday` | `today` |
        | `birthcity` | `eql`, `not_eql`, `ext`, `not_ext` |
        | `birthcountry` | `eql`, `not_eql`, `ext`, `not_ext` |
        | `nationality` | `eql`, `not_eql`, `ext`, `not_ext` |
        | `mail` | `eql:strictdata`, `not_eql:strictdata`, `ext`, `not_ext`, `start_with`, `not_start_with` |
        | `phone` | `eql`, `not_eql`, `ext`, `not_ext`, `start_with`, `not_start_with` |
        | `mobile` | `contains`, `eql`, `not_eql`, `ext`, `not_ext`, `start_with`, `not_start_with` |
        | `address.addition` | `eql`, `not_eql`, `ext`, `not_ext` |
        | `address.building` | `eql`, `not_eql`, `ext`, `not_ext` |
        | `address.building_type` | `eql`, `not_eql`, `ext`, `not_ext`, `start_with`, `not_start_with` |
        | `address.city` | `eql`, `not_eql`, `ext`, `not_ext`, `start_with`, `not_start_with` |
        | `address.country` | `eql`, `not_eql`, `ext`, `not_ext` |
        | `address.county` | `eql`, `not_eql`, `ext`, `not_ext`, `start_with`, `not_start_with` |
        | `address.door` | `eql`, `not_eql`, `ext`, `not_ext` |
        | `address.floor` | `eql`, `not_eql`, `ext`, `not_ext` |
        | `address.housenumber` | `eql`, `not_eql`, `ext`, `not_ext` |
        | `address.pollingstation` | `eql`, `not_eql`, `any_of`, `none_of`, `ext`, `not_ext` |
        | `address.postalcode` | `eql`, `not_eql`, `ext`, `not_ext`, `start_with`, `not_start_with` |
        | `address.state` | `eql`, `not_eql`, `ext`, `not_ext`, `start_with`, `not_start_with` |
        | `address.street` | `eql`, `not_eql`, `ext`, `not_ext`, `start_with`, `not_start_with` |
        | `tags.name` | `eql`, `not_eql`, `any_of`, `none_of`, `all_of`, `ext`, `not_ext` |
        | `emails.blacklisted_at` | `eql`, `ext`, `not_ext`, `range`, `lte`, `gte`, `period` |
        | `lastchange` | `eql`, `ext`, `not_ext`, `range`, `lte`, `gte`, `period` |
        | `CreatedAt` | `eql`, `ext`, `not_ext`, `range`, `lte`, `gte`, `period` |
        | `UpdatedAt` | `eql`, `ext`, `not_ext`, `range`, `lte`, `gte`, `period` |
        | `user_id` | `eql`, `not_eql`, `ext`, `not_ext` |
        | `user_contact_id` | `ext`, `not_ext` |
        | `nationbuilderid` | `eql`, `not_eql`, `ext`, `not_ext` |


        ## Pagination

        You can retrieve maximum **1000 contacts per request**. If you need more, you can request multiple pages.

        | Parameter | Description |
        |-----------|-------------|
        | `per_page` | Number of contacts per page *(required: 1-1000)* |
        | `page` | Page number *(default: 0)* |
        | `sort_asc` | Sort contacts in ascending order *(default: false)* |
        | `sort_attr` | Attribute to sort by: `surname`, `firstname`, `birthdate`, `gender`, `lastchange`, `mail`, `married_name`, `city` |

        ---

        ## Interactions

        If you need contacts interactions, use the `include_interactions` parameter.

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: "#/components/schemas/Search"
            examples:
              Minimal Search:
