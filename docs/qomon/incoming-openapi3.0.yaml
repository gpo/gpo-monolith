                description: ID of the form
              label:
                type: string
                description: Label of the form
              value:
                type: string

    FormData:
      type: object
      required: [form_id, form_ref_id]
      properties:
        form_id:
          type: integer
        form_ref_id:
          type: integer
        data:
          type: string
    FormDataResp:
      description: |-
        A formdata is a response to a form. It links a contact, a form and a refvalue.
        <br>A contact (`contact_id`) anwser to a form (`form_id`) by selecting
        a refvalue (`form_ref_id`) with a value (`data`).
      type: object
      properties:
        id:
          type: integer
          example: 1178304
        created_at:
          type: string
          format: date-time
          example: "2022-10-13T15:50:24.163Z"
        updated_at:
          type: string
          format: date-time
          example: "2022-10-13T15:50:24.163Z"
        deleted_at:
          type: string
          format: date-time
          example: "2022-10-13T15:50:24.163Z"
          nullable: true
        data:
          type: string
          example: Oui
        date:
          type: string
          format: date-time
          example: "2022-10-13T15:50:24.163Z"
        donedate:
          type: string
          format: date-time
          nullable: true
          example: null
        label:
          type: string
          nullable: true
          example: null
        type_of_form:
          type: string
          nullable: true
          example: null
        group_id:
          type: integer
          example: 4567
        contact_id:
          type: integer
          example: 83854766
          description: ID of the contact
        form_id:
          type: integer
          example: 97885
          description: ID of the form
        form_ref_id:
          type: integer
          example: 1542036
          description: ID of the refvalue of the form

    AdvancedSearchCondition:
      type: object
      additionalProperties: false
      properties:
        $condition:
          type: object
          oneOf:
            - required: [attr, ope]
              additionalProperties: false
              properties:
                attr:
                  type: string
                  example: surname
                  description: Attribute
                  enum:
                    - firstname
                    - surname
                    - married_name
                    - gender
                    - birthdate
                    - age_cat
                    - birthcity
                    - birthcountry
                    - mail
                    - mobile
                    - phone
                    - address.building
                    - address.floor
                    - address.door
                    - address.housenumber
                    - address.street
                    - address.addition
                    - address.postalcode
                    - address.city
                    - address.country
                    - address.pollingstation
                    - address.invalid
                    - tags.name
                    - lastchange
                    - user_id
                    - user_contact_id
                    - action_ids
                    - black_list
                    - petitions.base_id
                    - onlineforms.base_id
                ope:
                  type: string
                  example: eq
                  description: |-
                    Operator
                    <br>`ext`, `not_ext`: all fields
                    <br>`eql`: firstname, surname, married_name, gender, birthdate, age_cat, birthcity, birthcountry, mobile, phone, address.building, address.floor, address.door, address.housenumber, address.street, address.addition, address.postalcode, address.city, address.country, address.pollingstation, tags.name, lastchange, user_id,user_contact_id, action_ids, petitions.base_id, onlineforms.base_id
                    <br>`not_eql`: firstname, surname, married_name, gender, age_cat, birthcity, birthcountry, mobile, phone, address.building, address.floor, address.door, address.housenumber, address.street, address.addition, address.postalcode, address.city, address.country, address.pollingstation, tags.name, user_id,user_contact_id, action_ids, petitions.base_id, onlineforms.base_id
                    <br>`start_with`, `not_start_with`: firstname, surname, married_name, mail, mobile, phone, address.street, address.postalcode, address.city, address.invalid
                    <br>`lte`, `gte`, `range`: birthdate, lastchange
                    <br>`eql:strictdata`, `not_eql:strictdata`: mail
                  enum:
                    - eql
                    - not_eql
                    - ext
                    - not_ext
                    - range
                    - lte
                    - gte
                    - start_with
                    - not_start_with
                    - eql:strictdata
                    - not_eql:strictdata
                value:
                  type: string
                  description: |-
                    Value of the attr if necessary (depends of the fields and the operator)
                  nullable: true
                  example: Dupont
                from:
                  type: string
                  format: date-time
                  description: Required only if "ope" is `range`
                  nullable: true
                  example: "1955-07-06T00:00:00Z"
                to:
                  type: string
                  format: date-time
                  description: Required only if "ope" is `range`
                  nullable: true
                  example: "1955-07-06T00:00:00Z"

            - required: [attr, ope, form_id, form_ref_ids]
              additionalProperties: false
              properties:
                attr:
                  type: string
                  example: form
                  description: Attribute
                  enum: [custom_fields, form]
                ope:
                  type: string
                  example: eq
                  description: |-
                    Operator
                    <br>`ext`, `not_ext`: all fields
                    <br>`eql`, `not_eql`: forms with type 'text', 'radio', 'checkbox', 'range' or 'date'
                    <br>`contains`, `not_contains`, `start_with`, `not_start_with`: forms with type 'text'
                    <br>`lte`, `gte`, `range`: forms with type 'date'
                  enum:
                    - eql
                    - not_eql
                    - ext
                    - not_ext
                    - range
                    - lte
                    - gte
                    - start_with
                    - not_start_with
                    - contains
                    - not_contains
                form_id:
                  type: integer
                  example: 4250
                  description: If attr is form, the form_id is required
                form_ref_ids:
                  type: array
                  description: If attr is form, the form_ref_ids is required
                  items:
                    type: integer
                  example: [6648]
                value:
                  type: string
                  description: |-
                    Value of the form_ref_ids if necessary (depends of the fields and the operator)
                  nullable: true
                  example: "Yes"
                from:
                  type: string
                  format: date-time
                  description: Required only if "ope" is `range`
                  nullable: true
                  example: "1955-07-06T00:00:00Z"
                to:
                  type: string
                  format: date-time
                  description: Required only if "ope" is `range`
                  nullable: true
                  example: "1955-07-06T00:00:00Z"
    AdvancedSearchNode:
      oneOf:
        - required: [$all]
          properties:
            $all:
              type: array
              items:
                $ref: "#/components/schemas/AdvancedSearchCondition"
        - required: [$at_least_one]
          properties:
            $at_least_one:
              type: array
              items:
                $ref: "#/components/schemas/AdvancedSearchCondition"

    Search:
      type: object
      required: [advanced_search]
      properties:
        advanced_search:
          type: object
          required: [query, per_page]
          additionalProperties: false
          properties:
            page:
              type: integer
              minimum: 0
              example: 0
            per_page:
              type: integer
              maximum: 1000
              minimum: 1
              example: 50
            sort_asc:
              type: boolean
              example: true
            sort_attr:
              type: string
              enum:
                - surname
                - firstname
                - birthdate
                - gender
                - lastchange
                - mail
                - married_name
                - city
              example: surname
            query:
              type: object
              oneOf:
                - required: [$all]
                  properties:
                    $all:
                      type: array
                      items:
                        $ref: "#/components/schemas/AdvancedSearchNode"
                - required: [$at_least_one]
                  properties:
                    $at_least_one:
                      type: array
                      items:
                        $ref: "#/components/schemas/AdvancedSearchNode"
        include_interactions:
          type: boolean
          example: true
