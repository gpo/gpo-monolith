          type: array
          items:
            type: integer
        type:
          type: string
          enum:
            - radio
            - checkbox
            - date
            - report
            - meet
            - text
            - signature
            - photos
            - numeric
            - range
            - other
        section:
          type: string
        activate:
          type: string
        order:
          type: integer
        # activate_auto_send:
        #   type: string
        label:
          type: string
        # filterbyidrefvalue:
        #   type: integer
        # index_refvalue_filterbyidrefvalue:
        #   type: integer
        refvalues:
          type: array
          items:
            $ref: '#/components/schemas/RefValue'
        # tag_for_nb:
        #   type: boolean
        mandatory:
          type: boolean

