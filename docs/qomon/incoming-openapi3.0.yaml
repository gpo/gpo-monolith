  /forms/{formId}:
    get:
      tags:
        - Forms
      summary: Retrieve a form using its ID.
      description: |-
        Retrieve detailed information about a specific form, including its label, type, and possible refvalues.

        A form represents a field or a question that can be associated with a contact. It contains:
        - Label: The name or description of the form (e.g., "What is your preferred contact method?").
        - Type: The format of the form, such as radio, text, checkbox, numeric, date, range, signature or photos
        - Refvalues: A list of possible answers or predefined values associated with the form. These can be simple options (e.g., "Yes" or "No") or a range of values, depending on the form type.

        Here’s an example of a form with a range type, where the refvalue specifies a minimum, maximum, and step for the range of answers:

        ```json
        {
          "id": 12515,
          "type": "range",
          "section": "My city and me",
          "order": 1,
          "label": "On a scale of 1 to 10, how would you rate your satisfaction with the council?",
          "refvalues": [
            {
              "id": 19477,
              "form_id": 12515,
              "min": 0,
              "max": 10,
              "step": 1
            }
          ]
        }
        ```

        This allows the form to represent a sliding scale, and the response can specify any value within this range.

        <b>Link with contacts: formdatas & custom_fields </b>

        When retrieving or working with contacts, the formdatas field links forms and refvalues to a contact. Custom fields have a dedicated structure in the contact object.

        Each entry in formdatas and custom_fields contains:
        - form_id: The ID of the form.
        - form_ref_id: The ID of the refvalue selected for that form.
        - data: The actual value or answer provided (e.g., "7" for a rating of 7 on the scale from 0 to 10).

        Example of formdatas in a contact for the range form:

        ```json
        "formdatas": [
          {
            "form_id": 12515,
            "form_ref_id": 19477,
            "data": "7"
          }
        ],
        "custom_fields": [
          {
            "form_id": 11391,
            "form_ref_id": 18151
            "data": "Architect",
          }
        ]
        ```
      parameters:
        - name: formId
          in: path
          description: ID of the form to return
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      form:
                        $ref: "#/components/schemas/Form"

  /forms/{type}:
    get:
      tags:
        - Forms
      summary: Retrieve forms by their type.
      description: |-
        See all forms of a specific type.

        The type parameter allows you to filter forms by their type. The available types are:
        - consent: Forms related to consent and data collection.
        - level_of_support: Forms related to the level of support provided.
        - presence_status: Forms related to the presence status of the contact.
        - custom_fields: Custom fields associated with the contact.
        - survey: Forms related to surveys and questionnaires.
        - tasks: Forms related to tasks and actions.

        Most forms can be viewed and managed through the Qomon interface in the space settings.

      parameters:
        - name: type
          in: path
          description: Type of form to return
          required: true
          schema:
            type: string
            enum:
              [
                consent,
                level_of_support,
                presence_status,
                custom_fields,
                survey,
                tasks,
              ]
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
