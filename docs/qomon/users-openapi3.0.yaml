    /users/invitation:
        post:
            tags: [Invitation]
            summary: 'Invite users by their emails.'
            description: "Send an invitation to the specified mail addresses.

                Each space has different roles and their corresponding role_id.

                If the mail address is already registered, the user will be
                added to the space.

                If the mail address is not registered, the user will be invited
                to join the space.


                💡 Not specifying a role_id will set the role \"user\" by
                default."
