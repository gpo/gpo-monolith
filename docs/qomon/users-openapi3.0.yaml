openapi: 3.1.0
info:
    version: '0.0'
    title: 'Qomon Users API'
    description: "##Welcome to our Users API documentation.

        This is Qomon's API definition.


        To get an authorization go to [Qomon's setting
        page](https://qomon.app/settings/extensions/connect) and create an API
        key.



        ---




        ## User object:

        A user is defined by their personal information:


        ```json

        {

        \  \"firstname\": \"John\",

        \  \"surname\": \"Doe\",

        \  \"mail\": \"john.doe@example.com\",

        \  \"mobile\": \"0123456789\",

        \  \"address\": {

        \    \"housenumber\": \"123\",

        \    \"street\": \"Rue de la paix\",

        \    \"city\": \"Paris\",

        \    \"country\": \"France\"

        \  }

        }

        ```

        And some qomon specific attributes:\ 


        ```

        {

        \  \"role\": [

        \    { \"superadmin\", \"admin\", \"manager\", \"user\", \"custom\" }

        \  ],

        \  \"status\": [

        \    { \"available week-end\", \"available night\" }

        \  ],

        }

        ```

        The space information is retrieved from the token used to authenticate
        the user.


        It is possible to :\ 

        - invite users by email and manage their invitations

        - list users in the current space, edit their informations and remove
        them

        - list all the roles and add a role to a user

        - list, create, update and delete teams (public or not)


        💡 Tips for Using the API:

        - *Roles gestion:*

        Each space has different roles and their corresponding role_id.

        You can retrieve the list of roles by calling the `/roles` endpoint.

        - *Team privacy:*

        Teams can be public or private. Public teams are visible to all users in
        the space, while private teams are only visible to their members."
servers:
    - description: 'Qomon API'
      url: 'https://incoming.qomon.app'
security:
    - bearerAuth: []
tags:
    - name: Invitation
      description: 'Invite users'
    - name: User
      description: 'Manage users'
    - name: Role
      description: 'List roles'
    - name: Team
      description: 'Create, Read, Update and Delete teams'
    - name: Notification
      description: 'Send global messages to teams'
