    /users:
        get:
            tags: [User]
            summary: 'Retrieve all users.'
            description: "Returns all users from the sender selected-space.


                💡 Response can be filtered using 3 parameters :\ 

                - *limit* : The maximum number of users to return.

                - *offset* : The starting index for the results (for
                pagination).

                - *sort* : A Boolean value indicating whether the results should
                be sorted in an ascending order (on first name and surname).

                Default value is true."
            parameters:
                [
                    {
                          name: limit,
                          in: query,
                          schema: {type: integer, format: uint, minimum: 1},
                          required: false,
                          description: 'Optional. The maximum number of users to return.',
                          example: 20,
                      },
                    {
                          name: offset,
                          in: query,
                          schema: {type: integer, format: uint, minimum: 0},
                          required: false,
                          description: 'Optional. The starting index for the results (for pagination).',
                          example: 0,
                      },
                    {
                          name: sort,
                          in: query,
                          schema: {type: boolean},
                          required: false,
                          description: 'Optional. Indicates whether the results should be sorted ascending
                              (true) or descending (false) by surname then
                              firstname. Default value is true.',
                          example: true,
                      },
                ]
            responses:
                {
                    '200':
                        {
                            description: OK,
                            content:
                                {
                                    application/json:
                                        {
                                            schema:
                                                {
                                                    type: object,
                                                    properties:
                                                        {
                                                            status: {type: string, example: success},
                                                            data:
                                                                {
                                                                    type: object,
                                                                    properties:
                                                                        {
                                                                            count:
                                                                                {
                                                                                    type: integer,
                                                                                    format: uint,
                                                                                    description: 'Number of users returned.',
                                                                                    example: 100,
                                                                                },
                                                                            teams: {type: string, example: null},
                                                                            users:
                                                                                {
                                                                                    type: array,
                                                                                    items:
                                                                                        {
                                                                                            type: object,
                                                                                            properties:
                                                                                                {
                                                                                                    created_at:
                                                                                                        {
                                                                                                            type: string,
                                                                                                            format: date-time,
                                                                                                            example: '2025-04-23T08:16:26.08912Z',
                                                                                                            description: 'The timestamp when the user was created (ISO 8601 format, UTC).',
                                                                                                        },
                                                                                                    updated_at:
                                                                                                        {
                                                                                                            type: string,
                                                                                                            format: date-time,
                                                                                                            example: '2025-04-30T09:55:59.320084Z',
                                                                                                            description: 'The timestamp when the user was last updated (ISO 8601 format,
                                                                                                                UTC).',
                                                                                                        },
                                                                                                    deleted_at:
                                                                                                        {
                                                                                                            type: string,
                                                                                                            format: date-time,
                                                                                                            example: '2025-04-30T09:55:59.320084Z',
                                                                                                            description: 'The timestamp when the user was soft deleted (ISO 8601 format,
                                                                                                                UTC).',
                                                                                                        },
                                                                                                    address:
                                                                                                        {
                                                                                                            type: string,
                                                                                                            example: '1 rue de la paix',
                                                                                                            description: 'The user''s street address.',
                                                                                                        },
                                                                                                    birthdate:
                                                                                                        {
                                                                                                            type: string,
                                                                                                            format: date-time,
                                                                                                            example: '1999-03-06T23:00:00Z',
                                                                                                            description: 'The user''s birthdate (ISO 8601 format, UTC).',
