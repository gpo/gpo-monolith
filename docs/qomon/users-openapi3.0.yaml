                merge.

                Any field you omit (except `name`) is cleared or reset on the
                server:

                -  `name` → preserved when omitted

                - `description` → reset to `\"\"`

                - `private` → reset to `false`

                - `hide_users` → reset to `false`

                - `users` → cleared (all members removed)

                - `leaders` → cleared (all leaders removed)

                - `address` → cleared

                In practice, re-send the team as a whole. A safe workflow is to
                GET the

                team from `/teams`, modify the fields you need, and send the
                full

                object back here."
