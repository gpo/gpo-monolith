                                                                                                            example: [1],
                                                                                                            description: 'A list of selected space IDs for the user.',
                                                                                                        },
                                                                                                    surname: {type: string, example: DohnJoe, description: 'The user''s surname'},
                                                                                                },
                                                                                        },
