                    application/json: {schema: {$ref: '#/components/schemas/GenericErrorResponse'}},
                }
    schemas:
        GenericErrorResponse:
            type: object
            description: "Client-side validation failure envelope returned with HTTP 4xx
                when the

                request payload is malformed (missing/invalid fields, bad JSON,
                …)."
            properties:
                {
                    status:
                        {
                            type: string,
                            example: fail,
                            description: 'Indicates the operation status.',
